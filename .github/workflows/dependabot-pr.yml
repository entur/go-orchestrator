# Dependabot PRs don't receive secrets by default. After a human approves the PR,
# re-run the full CI (with secrets) by calling the reusable ci.yml.
name: Dependabot CI (post-approval)
on:
  pull_request_review:
    types: [submitted]
# ci.yml (Go library) only checks out + builds/lints/tests — read is enough.
permissions:
  contents: read
jobs:
  ci:
    if: github.event.review.state == 'approved' && github.event.pull_request.user.login == 'dependabot[bot]'
    uses: ./.github/workflows/ci.yml
    secrets: inherit
