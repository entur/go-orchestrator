name: Release

on:
  push:
    branches:
      - main

# Least-privilege default; the release-please job widens to write below.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version-file: "./go.mod"

    - name: Build
      run: go build -v ./...

    - name: Lint
      uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v8
      with:
        version: v2.4
        args: --timeout 5m ./...

    - name: Test
      run: go test -json -coverpkg=./... -coverprofile=coverage.out ./... > test-report.json
      
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
      env:
        SONAR_TOKEN: ${{ secrets.ENTUR_SONAR_PASSWORD }}

  release-please:
    needs: [build]
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: entur/gha-meta/.github/workflows/release.yml@v1
    with:
      release_type: go
